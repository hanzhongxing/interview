server:
  port: 8086

spring:
  application:
    name: ai-interview
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

interview:
  data-path: /opt/web/interview/data
  mcp_path: ${interview.data-path}/mcp
  jd_path: ${interview.data-path}/jd
  kb-path: ${interview.data-path}/kb
  resume-path: ${interview.data-path}/resumes
  vector-store-path: ${interview.data-path}/vectors/store.json
  speech-path: ${interview.data-path}/speech
